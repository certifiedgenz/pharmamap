version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: pharmamap-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pharmamap
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmamap-backend
    restart: on-failure
    depends_on:
      - database
    environment:
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=pharmamap
      - DB_USER=root
      - DB_PASSWORD=root
      - JWT_SECRET=8f2a9c1e7d3b6f4a2e5c8b7d1e0f3a6c9d2b5e8a1f4c7d0b3e6f9a2c5b8e1d4
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmamap-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
